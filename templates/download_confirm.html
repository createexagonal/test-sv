<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Descargar — By Exagonal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808;
    --card: #0f0f0f;
    --border: #1e1e1e;
    --gold: #c9a84c;
    --gold2: #e8c97a;
    --gold3: #f5e0a0;
    --golddim: rgba(201,168,76,0.10);
    --goldborder: rgba(201,168,76,0.25);
    --text: #f0ece0;
    --muted: #5a5648;
    --red: #e05c5c;
    --reddim: rgba(224,92,92,0.10);
    --redborder: rgba(224,92,92,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 50% 30%, rgba(201,168,76,0.06) 0%, transparent 60%),
      linear-gradient(rgba(201,168,76,0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.012) 1px, transparent 1px);
    background-size: 100% 100%, 48px 48px, 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .gold-line-h {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.35;
    z-index: 10;
  }
  .gold-line-b {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.35;
    z-index: 10;
  }

  .card {
    position: relative;
    z-index: 1;
    background: var(--card);
    border: 1px solid var(--goldborder);
    padding: 3.5rem 4rem;
    width: 100%;
    max-width: 520px;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .lock-icon {
    width: 52px;
    height: 52px;
    border: 1px solid var(--goldborder);
    background: var(--golddim);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2rem;
  }

  .lock-icon svg {
    width: 22px;
    height: 22px;
    stroke: var(--gold);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
  }

  .card-label {
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.8rem;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.5rem;
    line-height: 1.2;
  }

  .card-file {
    font-size: 0.65rem;
    color: var(--muted);
    margin-bottom: 2rem;
    word-break: break-all;
    letter-spacing: 0.05em;
  }

  .hint {
    background: var(--golddim);
    border: 1px solid var(--goldborder);
    padding: 0.9rem 1.2rem;
    margin-bottom: 1.8rem;
    font-size: 0.68rem;
    color: var(--gold2);
    line-height: 1.7;
  }

  .hint strong {
    font-weight: 700;
    color: var(--gold3);
  }

  /* Error */
  .error-box {
    background: var(--reddim);
    border: 1px solid var(--redborder);
    padding: 0.9rem 1.2rem;
    margin-bottom: 1.5rem;
    font-size: 0.68rem;
    color: var(--red);
    display: {% if error %}flex{% else %}none{% endif %};
    align-items: center;
    gap: 0.6rem;
  }

  .error-box svg {
    width: 14px; height: 14px;
    stroke: var(--red);
    fill: none;
    stroke-width: 1.5;
    flex-shrink: 0;
  }

  form { display: flex; flex-direction: column; gap: 1rem; }

  label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.35rem;
    display: block;
  }

  .input-wrap { position: relative; }

  input[type="text"] {
    width: 100%;
    background: #0a0a0a;
    border: 1px solid var(--border);
    border-radius: 0;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    padding: 0.9rem 1.2rem;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.05em;
  }

  input[type="text"]:focus {
    border-color: var(--gold);
  }

  input[type="text"]::placeholder {
    color: #2a2520;
  }

  .submit-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.7rem;
    padding: 1rem 2rem;
    background: transparent;
    border: 1px solid var(--goldborder);
    color: var(--gold);
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s;
    width: 100%;
    margin-top: 0.5rem;
  }

  .submit-btn:hover {
    background: var(--gold);
    color: #080808;
    border-color: var(--gold);
  }

  .submit-btn svg {
    width: 13px; height: 13px;
    transition: transform 0.2s;
  }
  .submit-btn:hover svg { transform: translateY(2px); }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.6rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--gold); }

  .corner {
    position: absolute;
    width: 12px;
    height: 12px;
    border-color: var(--gold);
    border-style: solid;
    opacity: 0.5;
  }
  .corner.tl { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
  .corner.tr { top: -1px; right: -1px; border-width: 1px 1px 0 0; }
  .corner.bl { bottom: -1px; left: -1px; border-width: 0 0 1px 1px; }
  .corner.br { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

  @media (max-width: 600px) {
    .card { padding: 2.5rem 1.8rem; margin: 1.5rem; }
  }
</style>
</head>
<body>

<div class="gold-line-h"></div>
<div class="gold-line-b"></div>

<div class="card">
  <span class="corner tl"></span>
  <span class="corner tr"></span>
  <span class="corner bl"></span>
  <span class="corner br"></span>

  <div class="lock-icon">
    <svg viewBox="0 0 24 24">
      <rect x="3" y="11" width="18" height="11" rx="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>

  <div class="card-label">Acceso restringido</div>
  <div class="card-title">Verificación requerida</div>
  <div class="card-file">📄 {{ filename }}</div>

  <div class="hint">
    Para descargar este archivo escribe la frase de acceso:<br>
    <strong>by exagonal</strong>
  </div>

  {% if error %}
  <div class="error-box" style="display:flex;">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    Frase incorrecta. Inténtalo de nuevo.
  </div>
  {% endif %}

  <form method="POST" action="/download-verify">
    <input type="hidden" name="filename" value="{{ filename }}">
    <div>
      <label for="passphrase">Frase de acceso</label>
      <div class="input-wrap">
        <input
          type="text"
          id="passphrase"
          name="passphrase"
          placeholder="escribe aquí..."
          autocomplete="off"
          autofocus
          spellcheck="false"
        >
      </div>
    </div>
    <button type="submit" class="submit-btn">
      Descargar archivo
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M6 1v7M3 5l3 3 3-3M1 10h10"/>
      </svg>
    </button>
  </form>

  <a href="/archivos" class="back-link">← Volver a archivos</a>
</div>

</body>
</html>
